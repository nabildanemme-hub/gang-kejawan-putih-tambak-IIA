<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Kegiatan - Kejawan Digital</title>
    <link rel="stylesheet" href="iki.css">
</head>
<body>
<div id="loader-wrapper">
    <div class="loader"></div>
    <p>Memuat Kejawan Digital...</p>
</div>
    <header>
        <h1>📸 Galeri Kegiatan</h1>
        <p>Momen Kebersamaan Warga Kejawan Putih</p>
    </header>

    <main>
        <div class="pin-container">
            <div class="pin-card" onclick="openLightbox(this)">
                <img src="foto/kerjo.png" alt="Kerja Bakti">
                <p class="pin-desc">Kerja Bakti Bulanan</p>
            </div>
            
            <div class="pin-card" onclick="openLightbox(this)">
                <img src="foto/lomba.png" alt="Lomba 17an">
                <p class="pin-desc">Lomba Balap Karung</p>
            </div>

            <div class="pin-card" onclick="openLightbox(this)">
                <img src="foto/syawir.png" alt="Rapat RT">
                <p class="pin-desc">Musyawarah Warga</p>
            </div>

            <div class="pin-card" onclick="openLightbox(this)">
                <img src="foto/senam.png" alt="Senam Pagi">
                <p class="pin-desc">Senam Sehat Minggu</p>
            </div>
        </div>

       <a href="index.html" class="btn-kembali-floating">
        <span class="icon-bali">←</span>
        <span class="text-bali">Beranda</span>
        </a>
    </main>

    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <span class="close-btn">&times;</span>
        <img id="lightbox-img" src="" alt="Zoomed Image">
        <div id="lightbox-caption"></div>
    </div>
    <footer>
        <p>&copy; 2026 Galeri Kejawan Digital ❤️</p>
    </footer>
    <script src="gerak.js"></script>
</body>
</html>
